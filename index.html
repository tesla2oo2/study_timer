<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Study Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --grad1:#667eea;--grad2:#764ba2;
  --glass:rgba(255,255,255,0.12);
  --glass2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.2);
  --text:rgba(255,255,255,0.95);
  --dim:rgba(255,255,255,0.55);
  --gold:#ffd700;
  --green:#00ff88;
}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,var(--grad1) 0%,var(--grad2) 100%);
  color:var(--text);display:flex;flex-direction:column;min-height:100vh;
}

.app{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1;}

.nav{
  display:flex;justify-content:space-around;align-items:center;
  padding:10px 0 6px;background:rgba(0,0,0,0.15);
  border-top:1px solid var(--border);flex-shrink:0;order:2;
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;color:var(--dim);
  font-family:'Inter',sans-serif;font-size:0.6rem;font-weight:500;
  cursor:pointer;padding:4px 16px;border-radius:10px;transition:all 0.2s;letter-spacing:0.05em;
}
.nav-btn .icon{font-size:1.3rem;}
.nav-btn.active{color:white;}

.pages{flex:1;overflow:hidden;order:1;}
.page{display:none;height:100%;overflow-y:auto;padding:16px 16px 10px;}
.page.active{display:flex;flex-direction:column;gap:12px;}

.card{
  background:var(--glass);border:1px solid var(--border);
  border-radius:18px;padding:16px;backdrop-filter:blur(10px);
}

.session-label{font-size:0.7rem;color:var(--dim);letter-spacing:0.1em;font-weight:500;}
.session-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.session-tab{
  background:var(--glass2);border:1px solid var(--border);color:var(--dim);
  padding:6px 14px;border-radius:10px;font-size:0.75rem;font-weight:500;
  cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;white-space:nowrap;
}
.session-tab.active{background:rgba(255,255,255,0.22);border-color:rgba(255,255,255,0.6);color:white;}
.add-session{
  background:var(--glass2);border:1px dashed var(--border);color:var(--dim);
  padding:6px 14px;border-radius:10px;font-size:0.75rem;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all 0.2s;margin-top:8px;display:inline-block;
}

.timer-center{display:flex;flex-direction:column;align-items:center;gap:8px;padding:8px 0;}
.timer-big{
  font-size:5.5rem;font-weight:200;font-variant-numeric:tabular-nums;
  letter-spacing:-0.04em;text-shadow:0 4px 24px rgba(0,0,0,0.3);line-height:1;
}
.timer-session-name{font-size:0.8rem;color:var(--dim);letter-spacing:0.08em;font-weight:400;}

.timer-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px 0;}

.timer-controls{display:flex;gap:10px;justify-content:center;}
.btn{
  padding:12px 28px;border:none;border-radius:14px;font-size:0.9rem;font-weight:600;
  cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;color:white;letter-spacing:0.02em;
}
.btn:active{transform:scale(0.97);}
.btn-start{background:rgba(34,197,94,0.8);}
.btn-pause{background:rgba(245,158,11,0.8);}
.btn-reset{background:rgba(255,255,255,0.15);border:1px solid var(--border);}

.duration-row{display:flex;align-items:center;gap:10px;justify-content:center;}
.dur-btn{
  background:var(--glass2);border:1px solid var(--border);color:white;
  width:36px;height:36px;border-radius:10px;font-size:1.2rem;cursor:pointer;
  font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;transition:all 0.2s;
}
.dur-input{
  background:var(--glass2);border:1px solid var(--border);color:white;
  width:80px;height:36px;border-radius:10px;font-size:1.1rem;font-weight:300;
  text-align:center;font-family:'Inter',sans-serif;
}
.dur-input:focus{outline:none;border-color:rgba(255,255,255,0.6);}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}

.today-strip{display:flex;justify-content:space-around;text-align:center;}
.today-stat .val{font-size:1.3rem;font-weight:600;}
.today-stat .lbl{font-size:0.58rem;color:var(--dim);letter-spacing:0.1em;margin-top:2px;}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-card{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;}
.stat-card .big{font-size:1.8rem;font-weight:700;line-height:1;}
.stat-card .lbl{font-size:0.6rem;color:var(--dim);letter-spacing:0.1em;margin-top:4px;}
.stat-card.gold .big{color:var(--gold);text-shadow:0 0 12px rgba(255,215,0,0.5);}
.stat-card.green .big{color:var(--green);text-shadow:0 0 12px rgba(0,255,136,0.4);}

.chart-wrap{position:relative;height:160px;}

.session-history{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;}
.history-item{
  display:flex;justify-content:space-between;align-items:center;
  background:var(--glass2);border-radius:10px;padding:8px 12px;font-size:0.78rem;
}
.history-item .name{font-weight:500;}
.history-item .meta{color:var(--dim);font-size:0.68rem;}
.history-item .mins{font-weight:600;color:var(--green);}

.lb-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;
  border-radius:12px;background:var(--glass2);margin-bottom:6px;
}
.lb-rank{font-size:1rem;font-weight:700;min-width:28px;text-align:center;}
.lb-rank.gold{color:var(--gold);}
.lb-rank.silver{color:#c0c0c0;}
.lb-rank.bronze{color:#cd7f32;}
.lb-avatar{
  width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;flex-shrink:0;
}
.lb-info{flex:1;}
.lb-name{font-size:0.85rem;font-weight:600;}
.lb-sub{font-size:0.62rem;color:var(--dim);}
.lb-hours{font-size:0.9rem;font-weight:700;color:var(--green);}
.lb-me{border:1px solid rgba(255,255,255,0.4);background:rgba(255,255,255,0.15);}

.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:50;
  display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);
}
.modal-bg.hidden{display:none;}
.modal{
  background:linear-gradient(160deg,#764ba2,#667eea);border-radius:20px 20px 0 0;
  padding:20px;width:100%;max-width:420px;border:1px solid var(--border);
}
.modal h3{font-size:1rem;font-weight:600;margin-bottom:14px;}
.modal input[type=text]{
  width:100%;background:var(--glass);border:1px solid var(--border);color:white;
  padding:10px 14px;border-radius:12px;font-size:0.9rem;font-family:'Inter',sans-serif;margin-bottom:10px;
}
.modal input[type=text]::placeholder{color:var(--dim);}
.modal input[type=text]:focus{outline:none;border-color:rgba(255,255,255,0.6);}
.modal-btns{display:flex;gap:8px;}
.btn-sm{padding:10px 20px;font-size:0.8rem;}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:80px;gap:8px;color:var(--dim);font-size:0.75rem;}
.spinner{width:24px;height:24px;border:2px solid rgba(255,255,255,0.2);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;color:var(--dim);font-size:0.8rem;padding:20px 0;}
.hidden{display:none!important;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:2px;}

@media(max-width:360px){.timer-big{font-size:4.5rem;}}
</style>
</head>
<body>
<div class="app">
  <div class="pages">

    <!-- TIMER -->
    <div class="page active" id="page-timer">
      <div class="card">
        <div class="session-label">SESSION TYPE</div>
        <div class="session-tabs" id="sessionTabs"></div>
        <button class="add-session" id="addSessionBtn">+ New session type</button>
      </div>

      <div class="card" style="display:flex;flex-direction:column;align-items:center;gap:14px;">
        <div class="timer-wrap">
          <div class="timer-big" id="timerDisplay">25:00</div>
          <div class="timer-session-name" id="sessionLabel">STUDY</div>
        </div>
        <div class="duration-row">
          <button class="dur-btn" id="durDown">−</button>
          <input class="dur-input" type="number" id="durInput" value="25" min="1" max="180">
          <button class="dur-btn" id="durUp">+</button>
        </div>
        <div class="timer-controls">
          <button class="btn btn-start" id="startBtn">Start</button>
          <button class="btn btn-pause hidden" id="pauseBtn">Pause</button>
          <button class="btn btn-reset" id="resetBtn">Reset</button>
        </div>
      </div>

      <div class="card today-strip">
        <div class="today-stat"><div class="val" id="todaySessions">0</div><div class="lbl">SESSIONS</div></div>
        <div class="today-stat"><div class="val" id="todayMins">0m</div><div class="lbl">TODAY</div></div>
        <div class="today-stat"><div class="val" id="streakCount">0🔥</div><div class="lbl">STREAK</div></div>
      </div>
    </div>

    <!-- STATS -->
    <div class="page" id="page-stats">
      <div class="stats-grid">
        <div class="stat-card gold"><div class="big" id="totalHours">0h</div><div class="lbl">TOTAL HOURS</div></div>
        <div class="stat-card green"><div class="big" id="totalSessions">0</div><div class="lbl">SESSIONS</div></div>
        <div class="stat-card"><div class="big" id="bestStreak">0🔥</div><div class="lbl">BEST STREAK</div></div>
        <div class="stat-card"><div class="big" id="avgSession">0m</div><div class="lbl">AVG SESSION</div></div>
      </div>
      <div class="card">
        <div class="session-label" style="margin-bottom:10px;">LAST 7 DAYS (minutes)</div>
        <div class="chart-wrap"><canvas id="weekChart"></canvas></div>
      </div>
      <div class="card">
        <div class="session-label" style="margin-bottom:8px;">RECENT SESSIONS</div>
        <div class="session-history" id="sessionHistory">
          <div class="loading"><div class="spinner"></div>Loading...</div>
        </div>
      </div>
    </div>

    <!-- LEADERBOARD -->
    <div class="page" id="page-lb">
      <div class="card" style="text-align:center;padding:10px;">
        <div style="font-size:0.65rem;color:var(--dim);letter-spacing:0.1em;">GLOBAL LEADERBOARD · TOP STUDIERS</div>
      </div>
      <div id="lbList"><div class="loading"><div class="spinner"></div>Loading...</div></div>
    </div>

  </div>

  <nav class="nav">
    <button class="nav-btn active" data-page="timer"><span class="icon">⏱</span>TIMER</button>
    <button class="nav-btn" data-page="stats"><span class="icon">📊</span>STATS</button>
    <button class="nav-btn" data-page="lb"><span class="icon">🏆</span>RANKS</button>
  </nav>
</div>

<!-- Modal -->
<div class="modal-bg hidden" id="modalBg">
  <div class="modal">
    <h3>New Session Type</h3>
    <input type="text" id="newSessionName" placeholder="e.g. Deep Work, Reading, Coding..." maxlength="20">
    <div class="modal-btns">
      <button class="btn btn-start btn-sm" id="saveSessionBtn">Save</button>
      <button class="btn btn-reset btn-sm" id="cancelSessionBtn">Cancel</button>
    </div>
  </div>
</div>

<script>
const SUPA_URL = 'https://ddicivnzkrsxbguydzws.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkaWNpdm56a3JzeGJndXlkendzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NTIzNDcsImV4cCI6MjA4ODQyODM0N30.e-k5Lbl6gwjJOS4nC6kpyy1zk3jlK7jKAM2EekkVg_g';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// Telegram user
let tgUser = null;
if (window.Telegram?.WebApp) { Telegram.WebApp.ready(); Telegram.WebApp.expand(); tgUser = Telegram.WebApp.initDataUnsafe?.user || null; }
if (!tgUser) tgUser = { id: 999, first_name: 'Guest', username: 'guest' };
const USER_ID   = tgUser.id;
const USER_NAME = tgUser.username || tgUser.first_name || 'User';

// Session types + per-session duration memory
const DEFAULT_SESSIONS = ['Study','Work','Reading','Coding'];
const DEFAULT_MINS     = { Study:25, Work:45, Reading:30, Coding:60 };
let sessionTypes = JSON.parse(localStorage.getItem('sessionTypes') || JSON.stringify(DEFAULT_SESSIONS));
let sessionMins  = JSON.parse(localStorage.getItem('sessionMins')  || JSON.stringify(DEFAULT_MINS));
let activeSession = sessionTypes[0];

function saveSessionTypes() { localStorage.setItem('sessionTypes', JSON.stringify(sessionTypes)); }
function saveSessionMins()  { localStorage.setItem('sessionMins',  JSON.stringify(sessionMins)); }

function getMinsForSession(s) { return sessionMins[s] || 25; }

function renderSessionTabs() {
  const wrap = document.getElementById('sessionTabs');
  wrap.innerHTML = '';
  sessionTypes.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'session-tab' + (s === activeSession ? ' active' : '');
    btn.textContent = s;
    btn.onclick = () => {
      if (isRunning) return;
      activeSession = s;
      document.getElementById('sessionLabel').textContent = s.toUpperCase();
      document.getElementById('durInput').value = getMinsForSession(s);
      remaining = getMinsForSession(s) * 60;
      totalSecs = remaining;
      updateDisplay();
      renderSessionTabs();
    };
    wrap.appendChild(btn);
  });
}

// Timer
let isRunning = false, timerInterval = null, remaining = 0, totalSecs = 0;

function getMinutes() { return parseInt(document.getElementById('durInput').value) || 25; }

function updateDisplay() {
  const m = Math.floor(remaining / 60), s = remaining % 60;
  document.getElementById('timerDisplay').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function startTimer() {
  if (remaining <= 0) { remaining = getMinutes() * 60; totalSecs = remaining; }
  isRunning = true;
  document.getElementById('startBtn').classList.add('hidden');
  document.getElementById('pauseBtn').classList.remove('hidden');
  timerInterval = setInterval(() => { remaining--; updateDisplay(); if (remaining <= 0) completeSession(); }, 1000);
}

function pauseTimer() {
  isRunning = false; clearInterval(timerInterval);
  document.getElementById('startBtn').classList.remove('hidden');
  document.getElementById('pauseBtn').classList.add('hidden');
}

function resetTimer() { pauseTimer(); remaining = getMinutes() * 60; totalSecs = remaining; updateDisplay(); }

async function completeSession() {
  pauseTimer(); haptic('success');
  const mins = getMinutes();
  try {
    await sb.from('sessions').insert({ telegram_id: USER_ID, username: USER_NAME, session_name: activeSession, duration_minutes: mins });
    await updateStreak(mins);
  } catch(e) { console.error(e); }
  remaining = 0; updateDisplay(); loadTodayStats();
}

async function updateStreak(mins) {
  const today = new Date().toISOString().split('T')[0];
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  const { data } = await sb.from('streaks').select('*').eq('telegram_id', USER_ID).single();
  if (data) {
    let streak = data.current_streak || 0;
    if (data.last_study_date === today) { /* already counted */ }
    else if (data.last_study_date === yesterday) { streak++; }
    else { streak = 1; }
    const longest = Math.max(streak, data.longest_streak || 0);
    await sb.from('streaks').update({ current_streak: streak, longest_streak: longest, total_minutes: (data.total_minutes||0)+mins, last_study_date: today, username: USER_NAME }).eq('telegram_id', USER_ID);
    document.getElementById('streakCount').textContent = streak + '🔥';
  } else {
    await sb.from('streaks').insert({ telegram_id: USER_ID, username: USER_NAME, current_streak: 1, longest_streak: 1, total_minutes: mins, last_study_date: today });
    document.getElementById('streakCount').textContent = '1🔥';
  }
}

function haptic(t) {
  try {
    if (t==='success') Telegram.WebApp.HapticFeedback.notificationOccurred('success');
    if (t==='light')   Telegram.WebApp.HapticFeedback.impactOccurred('light');
  } catch(e) {}
}

async function loadTodayStats() {
  const today = new Date().toISOString().split('T')[0];
  const { data } = await sb.from('sessions').select('duration_minutes').eq('telegram_id', USER_ID).gte('completed_at', today + 'T00:00:00');
  if (data) {
    const total = data.reduce((a,b) => a + b.duration_minutes, 0);
    document.getElementById('todaySessions').textContent = data.length;
    document.getElementById('todayMins').textContent = total >= 60 ? Math.floor(total/60)+'h '+(total%60)+'m' : total+'m';
  }
  const { data: sd } = await sb.from('streaks').select('current_streak').eq('telegram_id', USER_ID).single();
  if (sd) document.getElementById('streakCount').textContent = (sd.current_streak||0) + '🔥';
}

let weekChart = null;
async function loadStats() {
  const { data: sd } = await sb.from('streaks').select('*').eq('telegram_id', USER_ID).single();
  if (sd) {
    const h = Math.floor((sd.total_minutes||0)/60), m = (sd.total_minutes||0)%60;
    document.getElementById('totalHours').textContent = h+'h'+(m>0?m+'m':'');
    document.getElementById('bestStreak').textContent = (sd.longest_streak||0)+'🔥';
  }
  const { data: all } = await sb.from('sessions').select('duration_minutes,session_name,completed_at').eq('telegram_id', USER_ID).order('completed_at', {ascending:false});
  if (all && all.length) {
    document.getElementById('totalSessions').textContent = all.length;
    const avg = Math.round(all.reduce((a,b)=>a+b.duration_minutes,0)/all.length);
    document.getElementById('avgSession').textContent = avg+'m';
    const hist = document.getElementById('sessionHistory');
    hist.innerHTML = '';
    all.slice(0,15).forEach(s => {
      const d = new Date(s.completed_at);
      const str = d.toLocaleDateString('en',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
      hist.innerHTML += `<div class="history-item"><div><div class="name">${s.session_name}</div><div class="meta">${str}</div></div><div class="mins">${s.duration_minutes}m</div></div>`;
    });
    const days=[], mins=[];
    for (let i=6;i>=0;i--) {
      const d = new Date(Date.now()-i*86400000);
      const ds = d.toISOString().split('T')[0];
      days.push(d.toLocaleDateString('en',{weekday:'short'}));
      mins.push(all.filter(s=>s.completed_at.startsWith(ds)).reduce((a,b)=>a+b.duration_minutes,0));
    }
    if (weekChart) weekChart.destroy();
    weekChart = new Chart(document.getElementById('weekChart'),{
      type:'bar',
      data:{labels:days,datasets:[{data:mins,backgroundColor:'rgba(255,255,255,0.3)',borderColor:'rgba(255,255,255,0.8)',borderWidth:2,borderRadius:6}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'rgba(255,255,255,0.6)',font:{size:11}}},y:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'rgba(255,255,255,0.6)',font:{size:11}}}}}
    });
  } else {
    document.getElementById('sessionHistory').innerHTML = '<div class="empty">No sessions yet. Start your first one! ⏱</div>';
  }
}

async function loadLeaderboard() {
  const { data } = await sb.from('streaks').select('telegram_id,username,total_minutes,current_streak').order('total_minutes',{ascending:false}).limit(20);
  const wrap = document.getElementById('lbList');
  if (!data||!data.length) { wrap.innerHTML='<div class="empty">No data yet. Be the first! 🏆</div>'; return; }
  wrap.innerHTML='';
  data.forEach((u,i)=>{
    const rank=i+1, h=Math.floor((u.total_minutes||0)/60), m=(u.total_minutes||0)%60;
    const hrs = h>0?h+'h '+(m>0?m+'m':''):m+'m';
    const medal = rank===1?'gold':rank===2?'silver':rank===3?'bronze':'';
    const isMe = u.telegram_id===USER_ID;
    const ava  = (u.username||'?')[0].toUpperCase();
    wrap.innerHTML+=`<div class="lb-item ${isMe?'lb-me':''}"><div class="lb-rank ${medal}">${rank<=3?['🥇','🥈','🥉'][rank-1]:rank}</div><div class="lb-avatar">${ava}</div><div class="lb-info"><div class="lb-name">${u.username||'User'} ${isMe?'(you)':''}</div><div class="lb-sub">${u.current_streak||0}🔥 streak</div></div><div class="lb-hours">${hrs}</div></div>`;
  });
}

// Nav
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const page=btn.dataset.page;
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('page-'+page).classList.add('active');
    if(page==='stats') loadStats();
    if(page==='lb') loadLeaderboard();
  });
});

// Controls
document.getElementById('startBtn').addEventListener('click', startTimer);
document.getElementById('pauseBtn').addEventListener('click', pauseTimer);
document.getElementById('resetBtn').addEventListener('click', resetTimer);

document.getElementById('durUp').addEventListener('click', () => {
  if (isRunning) return;
  const inp = document.getElementById('durInput');
  const val = Math.min(180, parseInt(inp.value || 25) + 5);
  inp.value = val;
  sessionMins[activeSession] = val;
  saveSessionMins();
  remaining = val * 60; totalSecs = remaining; updateDisplay();
});

document.getElementById('durDown').addEventListener('click', () => {
  if (isRunning) return;
  const inp = document.getElementById('durInput');
  const val = Math.max(1, parseInt(inp.value || 25) - 5);
  inp.value = val;
  sessionMins[activeSession] = val;
  saveSessionMins();
  remaining = val * 60; totalSecs = remaining; updateDisplay();
});

document.getElementById('durInput').addEventListener('change', () => {
  if (isRunning) return;
  const val = Math.max(1, Math.min(180, parseInt(document.getElementById('durInput').value) || 25));
  document.getElementById('durInput').value = val;
  sessionMins[activeSession] = val;
  saveSessionMins();
  remaining = val * 60; totalSecs = remaining; updateDisplay();
});

// Modal
document.getElementById('addSessionBtn').addEventListener('click',()=>{ document.getElementById('modalBg').classList.remove('hidden'); document.getElementById('newSessionName').focus(); });
document.getElementById('cancelSessionBtn').addEventListener('click',()=>{ document.getElementById('modalBg').classList.add('hidden'); });
document.getElementById('saveSessionBtn').addEventListener('click',()=>{
  const name=document.getElementById('newSessionName').value.trim();
  if(name&&!sessionTypes.includes(name)){
    sessionTypes.push(name);
    sessionMins[name] = 25;
    saveSessionTypes();
    saveSessionMins();
    activeSession=name;
    document.getElementById('durInput').value = 25;
    remaining = 25*60; totalSecs = remaining; updateDisplay();
    renderSessionTabs();
    document.getElementById('sessionLabel').textContent=name.toUpperCase();
  }
  document.getElementById('newSessionName').value='';
  document.getElementById('modalBg').classList.add('hidden');
});
document.getElementById('modalBg').addEventListener('click',e=>{ if(e.target===document.getElementById('modalBg')) document.getElementById('modalBg').classList.add('hidden'); });

// Init
renderSessionTabs();
const initMins = getMinsForSession(activeSession);
document.getElementById('durInput').value = initMins;
remaining = initMins * 60; totalSecs = remaining; updateDisplay();
loadTodayStats();
</script>
</body>
</html>
